<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhishGuard Options</title>
    <link rel="stylesheet" href="../popup/popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <div class="card">
        <h1>Extension settings</h1>
        <p class="muted">Point the extension at your running PhishGuard backend.</p>
        <label>
          Backend URL
          <input id="backend-url" placeholder="http://127.0.0.1:8080" readonly />
        </label>
        <div class="btn-row">
          <button id="save-btn" class="primary-btn" type="button">Save</button>
        </div>
        <p id="status" class="status" style="margin-top: 8px;"></p>
      </div>
    </main>
    <script src="../api_config.js"></script>
    <script src="options.js"></script>
  </body>
</html>
